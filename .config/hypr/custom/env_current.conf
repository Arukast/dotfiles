# Gunakan driver Nvidia untuk decoding video browser/player
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = GBM_BACKEND,nvidia-drm
env = NVD_BACKEND,direct

# Prioritaskan AMD (iGPU) sebagai renderer utama untuk kestabilan display laptop
# Format: <gpu_utama>:<gpu_kedua>
env = AQ_DRM_DEVICES,/dev/dri/amd-igpu:/dev/dri/nvidia-dgpu
