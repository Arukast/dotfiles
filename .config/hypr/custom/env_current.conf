# Gunakan driver Nvidia untuk decoding video browser/player
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = NVD_BACKEND,direct

# Prioritaskan NVIDIA untuk performa di monitor eksternal (Mode Desk)
# Format: <gpu_utama>:<gpu_kedua>
env = AQ_DRM_DEVICES,/dev/dri/nvidia-dgpu:/dev/dri/amd-igpu