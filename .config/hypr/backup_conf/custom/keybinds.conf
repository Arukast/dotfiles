###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
# See https://wiki.hypr.land/Configuring/Binds/

$mainMod = SUPER # Sets "Windows" key as main modifier

##! Apps
bind = $mainMod, T, exec, $terminal # Terminal
bind = $mainMod, Return, exec, $terminal # Terminal
bind = $mainMod, SPACE, exec, ~/.config/rofi/launchers/launcher.sh # App Launcher
bind = $mainMod, W, exec, $browser # Browser
bind = $mainMod, E, exec, $fileManager # File Manager
bind = $mainMod, C, exec, $codeEditor # Code Editor
bind = $mainMod, N, exec, swaync-client -t -sw # Notifications
bind = $mainMod, Slash, exec, ~/.config/hypr/scripts/keybinds_hint.sh # Keybinds Cheatsheet

##! Window Management
bind = $mainMod, Q, killactive, # Close Window
bind = Alt, F4, killactive, # [hidden]
bind = $mainMod+Shift+Alt, Q, exec, hyprctl kill # Forcefully zap a window

# Positioning and Mode
bind = $mainMod+Alt, Space, togglefloating, # Toggle Floating
bind = $mainMod, G, fullscreen, 1 # Maximize
bind = $mainMod, F, fullscreen, 0 # Fullscreen
bind = $mainMod+Alt, F, fullscreenstate, 0 3 # Fullscreen spoof
bind = $mainMod, O, pin # Pin Window
bind = $mainMod, J, layoutmsg, togglesplit # Dwindle split toggle

# Focus and Move
bind = $mainMod, Left, movefocus, l # Focus Left
bind = $mainMod, Right, movefocus, r # Focus Right
bind = $mainMod, Up, movefocus, u # Focus Up
bind = $mainMod, Down, movefocus, d # Focus Down
bind = $mainMod, BracketLeft, movefocus, l # [hidden]
bind = $mainMod, BracketRight, movefocus, r # [hidden]

bind = $mainMod+Shift, Left, movewindow, l # Move Window Left
bind = $mainMod+Shift, Right, movewindow, r # Move Window Right
bind = $mainMod+Shift, Up, movewindow, u # Move Window Up
bind = $mainMod+Shift, Down, movewindow, d # Move Window Down

# Mouse Binds
bindm = $mainMod, mouse:272, movewindow # Move Window (Mouse)
bindm = $mainMod, mouse:273, resizewindow # Resize Window (Mouse)
bindm = $mainMod, mouse:274, movewindow # [hidden]

##! Workspace Management
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1 # Switch to Workspace 1
bind = $mainMod, 2, workspace, 2 # Switch to Workspace 2
bind = $mainMod, 3, workspace, 3 # Switch to Workspace 3
bind = $mainMod, 4, workspace, 4 # Switch to Workspace 4
bind = $mainMod, 5, workspace, 5 # Switch to Workspace 5
bind = $mainMod, 6, workspace, 6 # Switch to Workspace 6
bind = $mainMod, 7, workspace, 7 # Switch to Workspace 7
bind = $mainMod, 8, workspace, 8 # Switch to Workspace 8
bind = $mainMod, 9, workspace, 9 # Switch to Workspace 9
bind = $mainMod, 0, workspace, 10 # Switch to Workspace 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1 # Move Window to Workspace 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2 # Move Window to Workspace 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3 # Move Window to Workspace 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4 # Move Window to Workspace 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5 # Move Window to Workspace 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6 # Move Window to Workspace 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7 # Move Window to Workspace 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8 # Move Window to Workspace 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9 # Move Window to Workspace 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10 # Move Window to Workspace 10

# Relative Workspace Navigation
bind = Ctrl+$mainMod, Right, workspace, r+1 # Next Workspace
bind = Ctrl+$mainMod, Left, workspace, r-1 # Previous Workspace
bind = $mainMod, Page_Down, workspace, +1 # Next Workspace
bind = $mainMod, Page_Up, workspace, -1 # Previous Workspace
bind = Ctrl+$mainMod, Page_Down, workspace, r+1 # Next Workspace (Relative)
bind = Ctrl+$mainMod, Page_Up, workspace, r-1 # Previous Workspace (Relative)

# Move Window to Relative Workspace
bind = $mainMod+Shift, mouse_down, movetoworkspace, r-1 # Move Window to Prev Workspace
bind = $mainMod+Shift, mouse_up, movetoworkspace, r+1 # Move Window to Next Workspace
bind = $mainMod+Alt, mouse_down, movetoworkspace, -1 # Move Window to Prev Workspace
bind = $mainMod+Alt, mouse_up, movetoworkspace, +1 # Move Window to Next Workspace
bind = $mainMod+Alt, Page_Down, movetoworkspace, +1 # Move Window to Next Workspace
bind = $mainMod+Alt, Page_Up, movetoworkspace, -1 # Move Window to Prev Workspace
bind = $mainMod+Shift, Page_Down, movetoworkspace, r+1 # Move Window to Next Workspace
bind = $mainMod+Shift, Page_Up, movetoworkspace, r-1 # Move Window to Prev Workspace
bind = Ctrl+$mainMod+Shift, Right, movetoworkspace, r+1 # Move Window to Next Workspace
bind = Ctrl+$mainMod+Shift, Left, movetoworkspace, r-1 # Move Window to Prev Workspace

# Scroll through existing workspaces
bind = $mainMod, mouse_down, workspace, e+1 # Next Workspace (Scroll)
bind = $mainMod, mouse_up, workspace, e-1 # Previous Workspace (Scroll)

##! Special Workspaces (Scratchpads)
bind = Alt, Tab, togglespecialworkspace, special # Toggle Scratchpad
bind = Ctrl Alt, Tab, movetoworkspacesilent, special # Send to Scratchpad
bind = $mainMod, mouse:275, togglespecialworkspace, # [hidden]

# Spotify / Discord (Uncomment if used)
# bind = $mainMod, S, togglespecialworkspace, spotify
# bind = $mainMod, D, togglespecialworkspace, discord

##! System & Session
bindd = $mainMod, L, Lock, exec, loginctl lock-session # Lock Session
bindld = $mainMod+Shift, L, Suspend, exec, systemctl suspend || loginctl suspend # Suspend System
bindd = Ctrl+Shift+Alt+$mainMod, Delete, Shutdown, exec, systemctl poweroff || loginctl poweroff # Shutdown System
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit # Power Menu
bind = $mainMod, P, exec, ~/.config/hypr/scripts/monitor_menu.sh # Monitor Layout Menu

##! Media Controls
# Volume and Brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ # Volume Up
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- # Volume Down
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle # Mute Audio
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle # Mute Mic
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+ # Brightness Up
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- # Brightness Down

# Player Controls
bindl = $mainMod+Shift, P, exec, playerctl play-pause # Play/Pause Media
bindl = $mainMod+Shift, N, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"` # Next Track
bindl = $mainMod+Shift, B, exec, playerctl previous # Previous Track
bindl = ,XF86AudioPlay, exec, playerctl play-pause # [hidden]
bindl = ,XF86AudioPause, exec, playerctl play-pause # [hidden]
bindl = ,XF86AudioNext, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"` # [hidden]
bindl = ,XF86AudioPrev, exec, playerctl previous # [hidden]

##! Utilities
# Screenshots
bind = $mainMod, PRINT, exec, hyprshot -m window # Screenshot Window
bind = , PRINT, exec, hyprshot -m output # Screenshot Monitor
bind = $mainMod Shift, S, exec, hyprshot -m region # Screenshot Region

# Color Picker & Clipboard
bind = $mainMod Shift, C, exec, hyprpicker -a # Color Picker
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy # Clipboard History
bind = CTRL SHIFT, grave, exec, pamixer --default-source -t # Mute Mic Toggle