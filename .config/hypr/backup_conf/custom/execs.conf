###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = rofi
$notification = swaync
$pipewire = pipewire
$xdgDesktopPortal = xdg-desktop-portal-hyprland
$authenticationAgent = systemctl --user start hyprpolkitagent
$statusBar = waybar
$wallpaper = awww-daemon & sleep 0.1 && awww img $HOME/Pictures/Wallpapers/redbull3.png
$clipboardManager = wl-paste --type text --watch cliphist store & wl-paste --type image --watch cliphist store & wl-clip-persist --clipboard regular
$browser = firefox
$codeEditor = code
$networkFrontEnd = nm-applet
$autoMounting = udiskie
$idleSystem = hypridle
$blueLightFilter = hyprsunset
# $displayOutputProfiles = kanshi

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:
# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = hyprpm reload -n

# Core Componenct (Some fix, Audit, etc)
exec-once = dbus-update-activation-environment --all
exec-once = sleep 1 && dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP __GLX_VENDOR_LIBRARY_NAME __EGL_VENDOR_LIBRARY_FILENAMES VK_DRIVER_FILES # Some Fix

exec-once = aa-notify -p -s 10 -w 60 -f /var/log/audit/audit.log

################# Misc: Systems #################
# exec-once = sleep 2 && $displayOutputProfiles & $statusBar & $wallpaper
exec-once = sleep 2; $statusBar & $wallpaper
# exec-once = sleep 3 && ~/.config/hypr/scripts/handle_monitor.sh

exec-once = sleep 3; $authenticationAgent & $idleSystem & $blueLightFilter & $autoMounting & $clipboardManager

################# Dark Mode #################
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "Adwaita-dark"   # for GTK3 apps
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps

################# Misc: Program #################
# Use Sleep 4 before start

# Discord
exec-once = sleep 4; sh -c 'grep -q 1 /sys/class/power_supply/AC*/online && discord --start-minimized &> /dev/null &'
# Spotify
exec-once = sleep 4; sh -c 'grep -q 1 /sys/class/power_supply/AC*/online && spotify-launcher &> /dev/null &'
# Steam
exec-once = sleep 4; sh -c 'grep -q 1 /sys/class/power_supply/AC*/online && steam -silent &> /dev/null &'